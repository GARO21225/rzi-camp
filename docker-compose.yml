version: '3.9'
services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: rzi_camp
      POSTGRES_USER: rzi
      POSTGRES_PASSWORD: rzi_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_db &&
             daphne -b 0.0.0.0 -p 8000 rzi_camp.asgi:application"
    environment:
      DATABASE_URL: postgresql://rzi:rzi_secret@db:5432/rzi_camp
      SECRET_KEY: rzi-camp-docker-secret-2026
      DEBUG: "False"
    ports: ["8000:8000"]
    depends_on: [db]

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [backend]

volumes:
  pgdata:
