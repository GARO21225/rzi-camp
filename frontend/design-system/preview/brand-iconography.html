<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:#fff; font-family:var(--font-sans); padding:24px; }
.wrap { display:grid; grid-template-columns:repeat(8,1fr); gap:14px; }
.cell { display:flex; flex-direction:column; align-items:center; gap:6px; }
.icon { font-size:30px; line-height:1; }
.lab { font-size:10px; color:var(--text-dim); text-align:center; }
.note { margin-top:18px; font-family:var(--font-mono); font-size:10px; color:var(--text-mute); text-transform:uppercase; letter-spacing:2px; }
</style></head><body>
<div class="wrap">
  <div class="cell"><div class="icon">🏠</div><div class="lab">Résidences</div></div>
  <div class="cell"><div class="icon">🗺️</div><div class="lab">Carte GIS</div></div>
  <div class="cell"><div class="icon">👤</div><div class="lab">Personnel</div></div>
  <div class="cell"><div class="icon">🛠️</div><div class="lab">Maintenance</div></div>
  <div class="cell"><div class="icon">✈️</div><div class="lab">Voyages</div></div>
  <div class="cell"><div class="icon">📅</div><div class="lab">Événements</div></div>
  <div class="cell"><div class="icon">📝</div><div class="lab">Demandes</div></div>
  <div class="cell"><div class="icon">🔔</div><div class="lab">Notifications</div></div>
  <div class="cell"><div class="icon">📊</div><div class="lab">Statistiques</div></div>
  <div class="cell"><div class="icon">⚡</div><div class="lab">Actions</div></div>
  <div class="cell"><div class="icon">⚠️</div><div class="lab">Alerte</div></div>
  <div class="cell"><div class="icon">🚨</div><div class="lab">Incident</div></div>
  <div class="cell"><div class="icon">🟢</div><div class="lab">Libre</div></div>
  <div class="cell"><div class="icon">🔴</div><div class="lab">Occupé</div></div>
  <div class="cell"><div class="icon">→</div><div class="lab">CTA arrow</div></div>
  <div class="cell"><div class="icon">✓</div><div class="lab">Confirm</div></div>
</div>
<div class="note">Iconography · native emoji + unicode · no SVG icon set</div>
</body></html>
