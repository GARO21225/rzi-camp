<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:24px; }
.swatches { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.sw { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; }
.sw .chip { height:88px; }
.sw .meta { padding:10px 12px; }
.sw .name { font-size:12px; font-weight:700; color:var(--text); }
.sw .hex  { font-family:var(--font-mono); font-size:11px; color:var(--text-dim); margin-top:2px; letter-spacing:.5px; }
.sw .role { font-size:10px; color:var(--text-mute); margin-top:2px; text-transform:uppercase; letter-spacing:1px; }
</style></head><body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:#1e3a8a"></div><div class="meta"><div class="name">RZI Blue</div><div class="hex">#1E3A8A</div><div class="role">Primary · navy</div></div></div>
  <div class="sw"><div class="chip" style="background:#2563eb"></div><div class="meta"><div class="name">Blue 700</div><div class="hex">#2563EB</div><div class="role">Gradient pair · link</div></div></div>
  <div class="sw"><div class="chip" style="background:#f0a500"></div><div class="meta"><div class="name">Gold</div><div class="hex">#F0A500</div><div class="role">Accent · headline #s</div></div></div>
</div>
</body></html>
