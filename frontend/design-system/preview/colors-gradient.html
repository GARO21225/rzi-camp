<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:24px; }
.hero { background:linear-gradient(135deg,#1e3a8a,#2563eb); border-radius:16px; padding:28px; box-shadow:0 4px 20px rgba(30,58,138,.25); color:#fff; }
.tag { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:.65; }
.title { font-size:18px; font-weight:700; margin-top:6px; }
.swatch-row { display:flex; gap:6px; margin-top:14px; align-items:center; }
.swatch-row span { font-family:var(--font-mono); font-size:10px; opacity:.85; }
.dot { width:14px; height:14px; border-radius:50%; }
</style></head><body>
<div class="hero">
  <div class="tag">Gradient · 135deg</div>
  <div class="title">linear-gradient(135deg, #1e3a8a, #2563eb)</div>
  <div class="swatch-row">
    <div class="dot" style="background:#1e3a8a;border:2px solid rgba(255,255,255,.4)"></div>
    <span>0% · #1E3A8A</span>
    <div class="dot" style="background:#2563eb;border:2px solid rgba(255,255,255,.4);margin-left:14px"></div>
    <span>100% · #2563EB</span>
  </div>
  <div class="tag" style="margin-top:14px">Used on : login bg · sidebar header · dashboard hero banner</div>
</div>
</body></html>
