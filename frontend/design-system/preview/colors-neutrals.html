<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:#fff; font-family:var(--font-sans); padding:24px; }
.row { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
.sw { border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; }
.sw .chip { height:56px; }
.sw .meta { padding:8px 10px; }
.sw .name { font-size:11px; font-weight:700; }
.sw .hex { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); }
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#f5f7fb"></div><div class="meta"><div class="name">Canvas</div><div class="hex">#F5F7FB</div></div></div>
  <div class="sw"><div class="chip" style="background:#eef1f7"></div><div class="meta"><div class="name">Bg-alt</div><div class="hex">#EEF1F7</div></div></div>
  <div class="sw"><div class="chip" style="background:#ffffff;border-right:1px solid var(--border)"></div><div class="meta"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#e5e7eb"></div><div class="meta"><div class="name">Border</div><div class="hex">#E5E7EB</div></div></div>
  <div class="sw"><div class="chip" style="background:#64748b"></div><div class="meta"><div class="name">Text-dim</div><div class="hex">#64748B</div></div></div>
  <div class="sw"><div class="chip" style="background:#0f172a"></div><div class="meta"><div class="name">Text</div><div class="hex">#0F172A</div></div></div>
</div>
</body></html>
