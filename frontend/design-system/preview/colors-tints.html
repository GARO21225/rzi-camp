<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:#fff; font-family:var(--font-sans); padding:24px; }
.row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.tint { border-radius:var(--r-lg); padding:14px; font-size:11px; font-family:var(--font-mono); letter-spacing:.5px; }
.tint .lab { font-size:10px; text-transform:uppercase; letter-spacing:1px; opacity:.85; margin-bottom:4px; font-family:var(--font-sans); font-weight:700; }
</style></head><body>
<div class="row">
  <div class="tint" style="background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.25);color:#16a34a"><div class="lab">Libre</div>tint 06% · bd 25%</div>
  <div class="tint" style="background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.25);color:#dc2626"><div class="lab">Danger</div>tint 06% · bd 25%</div>
  <div class="tint" style="background:rgba(234,88,12,.06);border:1px solid rgba(234,88,12,.25);color:#ea580c"><div class="lab">Warning</div>tint 06% · bd 25%</div>
  <div class="tint" style="background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.25);color:#7c3aed"><div class="lab">Event</div>tint 06% · bd 25%</div>
  <div class="tint" style="background:rgba(30,58,138,.06);border:1px solid rgba(30,58,138,.25);color:#1e3a8a"><div class="lab">Brand</div>tint 06% · bd 25%</div>
</div>
</body></html>
