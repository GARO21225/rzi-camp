<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:24px; }
.f { background:#fff; border:1px solid var(--border); border-radius:12px; padding:18px; }
.lab { display:block; font-size:11px; color:var(--text-dim); font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
.in { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:9px; font-family:inherit; font-size:13px; box-sizing:border-box; }
.in:focus { outline:none; border-color:#1e3a8a; }
.row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.btns { display:flex; gap:8px; margin-top:6px; }
.btn  { flex:1; padding:10px; border-radius:9px; font-size:12px; font-weight:700; border:0; cursor:pointer; font-family:inherit; }
.primary { background:#1e3a8a; color:#fff; }
.ghost { background:rgba(30,58,138,.06); color:#1e3a8a; border:1px solid rgba(30,58,138,.15); }
</style></head><body>
<form class="f">
  <div class="row">
    <div><label class="lab">Bâtiment</label><input class="in" value="B-12"></div>
    <div><label class="lab">Chambre</label><input class="in" value="A2"></div>
  </div>
  <div class="row">
    <div><label class="lab">Date d'arrivée</label><input class="in" value="15/03/2024"></div>
    <div><label class="lab">Date de départ</label><input class="in" value="22/03/2024"></div>
  </div>
  <div class="btns"><button class="btn ghost">Annuler</button><button class="btn primary">Enregistrer</button></div>
</form>
</body></html>
