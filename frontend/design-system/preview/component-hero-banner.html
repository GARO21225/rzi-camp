<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:24px; }
.hero { background:linear-gradient(135deg,#1e3a8a,#2563eb); border-radius:16px; padding:18px 20px; display:flex; align-items:center; gap:14px; box-shadow:0 4px 20px rgba(30,58,138,.25); color:#fff; }
.plate { background:#fff; border-radius:10px; padding:5px 10px; flex-shrink:0; }
.tag { font-size:10px; color:rgba(255,255,255,.6); font-family:var(--font-mono); letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
.title { font-size:16px; font-weight:700; text-transform:capitalize; }
.num { font-family:var(--font-mono); font-size:38px; font-weight:700; color:#f0a500; line-height:1; }
.cap { font-size:10px; color:rgba(255,255,255,.6); text-transform:uppercase; letter-spacing:1px; }
</style></head><body>
<div class="hero">
  <img class="plate" src="../assets/roxgold-logo.png" alt="Roxgold Sango" style="height:42px;display:block">
  <div style="flex:1">
    <div class="tag">Résidence Roxgold Sango</div>
    <div class="title">vendredi 15 mars 2024</div>
  </div>
  <div style="text-align:center;flex-shrink:0">
    <div class="num">134</div>
    <div class="cap">Bâtiments</div>
  </div>
</div>
</body></html>
