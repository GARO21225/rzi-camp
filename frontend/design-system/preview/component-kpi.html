<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:24px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kpi { background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
.kpi.green  { border-top:4px solid #16a34a; }
.kpi.red    { border-top:4px solid #dc2626; }
.kpi.gold   { border-top:4px solid #f0a500; }
.kpi.orange { border-top:4px solid #ea580c; }
.num { font-family:var(--font-mono); font-size:26px; font-weight:700; line-height:1; }
.lab { font-size:10px; color:var(--text-dim); margin-top:5px; text-transform:uppercase; letter-spacing:1px; }
.sub { font-size:11px; margin-top:2px; font-weight:600; }
</style></head><body>
<div class="grid">
  <div class="kpi green"><div class="num" style="color:#16a34a">42</div><div class="lab">🟢 Libres</div></div>
  <div class="kpi red"><div class="num" style="color:#dc2626">87</div><div class="lab">🔴 Occupés</div></div>
  <div class="kpi gold"><div class="num" style="color:#dc2626">67%</div><div class="lab">📊 Taux occup.</div><div class="sub" style="color:#dc2626">⚠️ Haute</div></div>
  <div class="kpi orange"><div class="num" style="color:#ea580c">3</div><div class="lab">📅 Départs S-1</div></div>
</div>
</body></html>
