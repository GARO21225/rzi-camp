<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:24px; }
.bar { display:flex; gap:8px; flex-wrap:wrap; }
.pill { font-family:inherit; font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; display:inline-flex; align-items:center; gap:5px; }
.dot { width:8px; height:8px; border-radius:50%; }
</style></head><body>
<div class="bar">
  <span class="pill" style="background:rgba(22,163,74,.1);color:#16a34a"><span class="dot" style="background:#16a34a"></span>Libre</span>
  <span class="pill" style="background:rgba(220,38,38,.1);color:#dc2626"><span class="dot" style="background:#dc2626"></span>Occupé</span>
  <span class="pill" style="background:rgba(37,99,235,.1);color:#2563eb"><span class="dot" style="background:#2563eb"></span>Réservé</span>
  <span class="pill" style="background:rgba(234,88,12,.1);color:#ea580c"><span class="dot" style="background:#ea580c"></span>Maintenance</span>
  <span class="pill" style="background:rgba(234,88,12,.1);color:#ea580c"><span class="dot" style="background:#ea580c"></span>En voyage</span>
</div>
<div class="bar" style="margin-top:14px">
  <span class="pill" style="background:#1e3a8a;color:#fff;border-radius:6px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;font-size:10px">B-12 · A2</span>
  <span class="pill" style="background:rgba(30,58,138,.08);color:#1e3a8a;border-radius:6px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;font-size:10px">Zone A</span>
  <span class="pill" style="background:rgba(240,165,0,.12);color:#a26900;border-radius:6px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;font-size:10px">VIP</span>
</div>
</body></html>
