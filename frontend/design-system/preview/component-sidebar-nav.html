<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:0; }
.sb { width:100%; background:#1e3a8a; padding:14px 0; }
.item { display:flex; align-items:center; gap:12px; padding:10px 18px; color:rgba(255,255,255,.85); font-size:13px; font-weight:500; cursor:pointer; }
.item.active { background:rgba(255,255,255,.12); color:#fff; border-left:3px solid #f0a500; padding-left:15px; font-weight:700; }
.item:hover:not(.active) { background:rgba(255,255,255,.05); color:#fff; }
.icon { font-size:16px; width:18px; text-align:center; }
.section { font-family:var(--font-mono); font-size:9px; color:rgba(255,255,255,.4); padding:14px 18px 6px; text-transform:uppercase; letter-spacing:2px; }
</style></head><body>
<div class="sb">
  <div class="section">Opérations</div>
  <div class="item active"><span class="icon">🏠</span>Résidences</div>
  <div class="item"><span class="icon">🗺️</span>Carte GIS</div>
  <div class="item"><span class="icon">👤</span>Personnel</div>
  <div class="section">Activité</div>
  <div class="item"><span class="icon">🛠️</span>Maintenance</div>
  <div class="item"><span class="icon">✈️</span>Voyages</div>
  <div class="item"><span class="icon">📅</span>Événements</div>
</div>
</body></html>
