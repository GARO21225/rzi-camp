<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:var(--bg); font-family:var(--font-sans); padding:24px; }
.row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; align-items:end; }
.cell { display:flex; flex-direction:column; align-items:center; }
.box { width:84px; height:84px; background:#1e3a8a; }
.lab { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); margin-top:8px; text-align:center; }
.tk { font-size:10px; color:var(--text-mute); margin-top:2px; }
</style></head><body>
<div class="row">
  <div class="cell"><div class="box" style="border-radius:6px"></div><div class="lab">6 px</div><div class="tk">--r-xs · progress</div></div>
  <div class="cell"><div class="box" style="border-radius:9px"></div><div class="lab">9 px</div><div class="tk">--r-sm · button</div></div>
  <div class="cell"><div class="box" style="border-radius:10px"></div><div class="lab">10 px</div><div class="tk">--r-md · plate</div></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><div class="lab">12 px</div><div class="tk">--r-lg · card</div></div>
  <div class="cell"><div class="box" style="border-radius:16px"></div><div class="lab">16 px</div><div class="tk">--r-xl · hero</div></div>
</div>
</body></html>
