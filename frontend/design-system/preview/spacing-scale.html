<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:#fff; font-family:var(--font-sans); padding:24px; }
.row { display:flex; align-items:flex-end; gap:12px; }
.bar { background:linear-gradient(135deg,#1e3a8a,#2563eb); border-radius:4px; }
.lab { font-family:var(--font-mono); font-size:9px; color:var(--text-dim); text-align:center; margin-top:6px; }
.col { display:flex; flex-direction:column; align-items:center; }
.tk { font-size:10px; color:var(--text-mute); margin-top:2px; }
</style></head><body>
<div style="font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px">Spacing scale · 4px base</div>
<div class="row">
  <div class="col"><div class="bar" style="width:24px;height:4px"></div><div class="lab">4</div><div class="tk">sp-1</div></div>
  <div class="col"><div class="bar" style="width:24px;height:6px"></div><div class="lab">6</div><div class="tk">sp-2</div></div>
  <div class="col"><div class="bar" style="width:24px;height:8px"></div><div class="lab">8</div><div class="tk">sp-3</div></div>
  <div class="col"><div class="bar" style="width:24px;height:10px"></div><div class="lab">10</div><div class="tk">sp-4</div></div>
  <div class="col"><div class="bar" style="width:24px;height:12px"></div><div class="lab">12</div><div class="tk">sp-5</div></div>
  <div class="col"><div class="bar" style="width:24px;height:14px"></div><div class="lab">14</div><div class="tk">sp-6</div></div>
  <div class="col"><div class="bar" style="width:24px;height:16px"></div><div class="lab">16</div><div class="tk">sp-7</div></div>
  <div class="col"><div class="bar" style="width:24px;height:18px"></div><div class="lab">18</div><div class="tk">sp-8</div></div>
  <div class="col"><div class="bar" style="width:24px;height:20px"></div><div class="lab">20</div><div class="tk">sp-9</div></div>
  <div class="col"><div class="bar" style="width:24px;height:24px"></div><div class="lab">24</div><div class="tk">sp-10</div></div>
</div>
</body></html>
