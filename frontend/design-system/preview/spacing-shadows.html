<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:#f5f7fb; font-family:var(--font-sans); padding:30px; }
.row { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.box { background:#fff; border-radius:12px; height:90px; display:flex; align-items:flex-end; padding:12px; }
.lab { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); }
.tk { font-size:10px; color:var(--text-mute); }
</style></head><body>
<div class="row">
  <div>
    <div class="box" style="box-shadow:0 2px 8px rgba(15,23,42,.06)"><span class="lab">card · 0 2px 8px / 06%</span></div>
    <div class="tk" style="margin-top:8px">default · every card</div>
  </div>
  <div>
    <div class="box" style="background:linear-gradient(135deg,#1e3a8a,#2563eb);box-shadow:0 4px 20px rgba(30,58,138,.25)"><span class="lab" style="color:rgba(255,255,255,.85)">hero · 0 4px 20px / 25%</span></div>
    <div class="tk" style="margin-top:8px">brand banner only</div>
  </div>
  <div>
    <div class="box" style="box-shadow:0 6px 16px rgba(15,23,42,.10);transform:translateY(-1px)"><span class="lab">hover · 0 6px 16px / 10%</span></div>
    <div class="tk" style="margin-top:8px">lift on hover, +translateY -1</div>
  </div>
</div>
</body></html>
