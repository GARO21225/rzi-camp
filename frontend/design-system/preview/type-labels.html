<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:#fff; font-family:var(--font-sans); padding:28px; }
.line { padding:10px 0; border-bottom:1px dashed var(--border); display:flex; align-items:center; justify-content:space-between; }
.line:last-child { border:0; }
.cap-1 { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); font-weight:600; }
.cap-2 { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); }
.cap-3 { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#1e3a8a; font-weight:700; }
.code { font-family:var(--font-mono); font-size:10px; color:var(--text-mute); }
</style></head><body>
<div class="line"><span class="cap-1">Sentence cap label</span><span class="code">10/600 · sans · ls 1px</span></div>
<div class="line"><span class="cap-2">MONOSPACE TAG</span><span class="code">10/400 · mono · ls 2px</span></div>
<div class="line"><span class="cap-3">BRAND COLOURED</span><span class="code">10/700 · #1E3A8A</span></div>
<div class="line"><span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);letter-spacing:.5px">15 mars 2024 · 14:32</span><span class="code">timestamp · mono</span></div>
<div class="line"><span style="font-size:12px;color:var(--text)">Sentence-case body text. Voilà.</span><span class="code">12/400 · body</span></div>
</body></html>
