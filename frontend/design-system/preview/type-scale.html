<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; background:#fff; font-family:var(--font-sans); padding:28px; color:var(--text); }
.row { display:flex; align-items:baseline; gap:18px; padding:8px 0; border-bottom:1px dashed var(--border); }
.row:last-child { border-bottom:0; }
.size { font-family:var(--font-mono); font-size:11px; color:var(--text-dim); width:80px; flex-shrink:0; }
.tk   { font-family:var(--font-mono); font-size:10px; color:var(--text-mute); width:80px; flex-shrink:0; text-transform:uppercase; letter-spacing:1px; }
</style></head><body>
<div class="row"><span class="size">38px / 700</span><span class="tk">--t-3xl</span><span style="font-family:var(--font-mono);font-size:38px;font-weight:700;color:#f0a500">240</span></div>
<div class="row"><span class="size">26px / 700</span><span class="tk">--t-2xl</span><span style="font-family:var(--font-mono);font-size:26px;font-weight:700;color:#16a34a">87</span></div>
<div class="row"><span class="size">20px / 700</span><span class="tk">--t-xl</span><span style="font-size:20px;font-weight:700;color:#1e3a8a">Section heading</span></div>
<div class="row"><span class="size">16px / 700</span><span class="tk">--t-lg</span><span style="font-size:16px;font-weight:700">Page subtitle</span></div>
<div class="row"><span class="size">13px / 700</span><span class="tk">--t-md</span><span style="font-size:13px;font-weight:700;color:#1e3a8a">Card heading</span></div>
<div class="row"><span class="size">12px / 400</span><span class="tk">--t-base</span><span style="font-size:12px">Body copy &amp; form labels</span></div>
<div class="row"><span class="size">11px / 400</span><span class="tk">--t-sm</span><span style="font-size:11px;color:var(--text-dim)">Captions and fine print</span></div>
<div class="row"><span class="size">10px / 600</span><span class="tk">--t-xs</span><span style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim)">UPPERCASE TAG</span></div>
</body></html>
