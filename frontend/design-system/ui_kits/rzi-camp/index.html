<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>RZI Camp — UI Kit</title>
<style>
  html, body { margin: 0; padding: 0; background: #f5f7fb;
               font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
               color: #0f172a; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); }
                      to   { opacity: 1; transform: none; } }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
function App() {
  const [authed, setAuthed] = React.useState(false);
  const [route, setRoute] = React.useState('dashboard');

  if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }} data-screen-label={`02 ${route}`}>
      <Sidebar active={route} onNavigate={setRoute} onLogout={() => setAuthed(false)} />
      <main style={{ flex: 1, minWidth: 0, background: '#f5f7fb' }}>
        {route === 'dashboard'   && <Dashboard onNavigate={setRoute} />}
        {route === 'residences'  && <Residences />}
        {route === 'maintenance' && <Maintenance />}
        {route === 'voyages'     && <Voyages />}
        {!['dashboard','residences','maintenance','voyages'].includes(route) && (
          <div style={{ padding: 32 }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: '#1e3a8a' }}>
              {route.charAt(0).toUpperCase() + route.slice(1)}
            </div>
            <div style={{ marginTop: 8, color: '#64748b', fontSize: 13 }}>
              Écran non recréé dans ce UI kit. Voir <code>Screens.jsx</code> pour ajouter.
            </div>
          </div>
        )}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
