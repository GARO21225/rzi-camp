<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RZI Camp — Résidence Roxgold Sango · Côte d'Ivoire</title>
  <link rel="icon" type="image/png" href="roxgold-logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ============================================================
       RZI CAMP 2.0 — Refonte V2 (calquée sur la capture)
       Palette Roxgold authentique (du design system V1)
       Côte d'Ivoire · Logo Roxgold
       ============================================================ */
    :root {
      --rzi-blue:        #1e3a8a;
      --rzi-blue-light:  #2563eb;
      --rzi-gold:        #f0a500;
      --rzi-bg:          #f1f5f9;
      --rzi-surface:     #ffffff;
      --rzi-border:      #e2e8f0;
      --rzi-text:        #1e293b;
      --rzi-text-dim:    #64748b;
      --status-ok:       #16a34a;
      --status-info:     #2563eb;
      --status-warn:     #ea580c;
      --status-alert:    #dc2626;
      --status-purple:   #7c3aed;
      --status-cyan:     #0891b2;
      --font-sans:       'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-sans);
      color: var(--rzi-text);
      background: var(--rzi-bg);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ═══ APP LAYOUT ═══ */
    .app { display: grid; grid-template-columns: 64px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }

    /* ═══ HEADER ═══ */
    .header {
      grid-column: 1 / -1;
      background: var(--rzi-surface);
      border-bottom: 1px solid var(--rzi-border);
      display: flex; align-items: center;
      padding: 0 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .header-x {
      width: 32px; height: 32px; border-radius: 6px;
      display: grid; place-items: center; color: var(--rzi-text-dim);
      background: transparent; border: none; cursor: pointer;
      font-size: 18px;
    }
    .header-x:hover { background: var(--rzi-bg); }
    .header-logo {
      width: 40px; height: 40px; border-radius: 8px;
      background: white; padding: 2px;
      display: grid; place-items: center;
      border: 1px solid var(--rzi-border);
    }
    .header-logo img { width: 100%; height: auto; }
    .header-title {
      font-size: 14px; font-weight: 700; color: var(--rzi-text);
      letter-spacing: .04em; text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .header-search {
      width: 280px; position: relative;
    }
    .header-search input {
      width: 100%; padding: 7px 12px 7px 32px;
      background: var(--rzi-bg); border: 1px solid var(--rzi-border);
      border-radius: 6px; font-size: 12px; color: var(--rzi-text);
      font-family: inherit;
    }
    .header-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--rzi-text-dim); }
    .header-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: transparent; border: none; cursor: pointer;
      display: grid; place-items: center; color: var(--rzi-text-dim);
    }
    .header-icon:hover { background: var(--rzi-bg); color: var(--rzi-text); }
    .header-icon.has-badge { position: relative; }
    .header-icon .badge {
      position: absolute; top: 4px; right: 4px;
      width: 18px; height: 18px;
      background: var(--rzi-gold); color: var(--rzi-blue);
      font-size: 9px; font-weight: 800; padding: 0 4px;
      border-radius: 9px;
      display: grid; place-items: center;
      letter-spacing: .04em;
    }
    .user-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 6px 3px 3px; background: transparent; border: none;
      cursor: pointer; border-radius: 6px;
    }
    .user-chip:hover { background: var(--rzi-bg); }
    .user-chip-info { text-align: right; line-height: 1.1; }
    .user-name { font-size: 12px; font-weight: 600; color: var(--rzi-text); }
    .user-role { font-size: 9px; font-weight: 800; color: var(--rzi-gold); letter-spacing: .08em; }
    .user-toggle { color: var(--rzi-text-dim); font-size: 12px; }

    /* ═══ SIDEBAR (rail d'icônes) ═══ */
    .sidebar {
      background: var(--rzi-surface);
      border-right: 1px solid var(--rzi-border);
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 0;
      overflow-y: auto;
    }
    .sidebar-btn {
      width: 44px; height: 44px; border-radius: 8px;
      background: transparent; border: none; cursor: pointer;
      color: var(--rzi-text-dim);
      display: grid; place-items: center;
      margin: 2px 0;
      transition: background .15s, color .15s;
      position: relative;
    }
    .sidebar-btn:hover { background: var(--rzi-bg); color: var(--rzi-text); }
    .sidebar-btn.active { color: var(--rzi-blue); }
    .sidebar-btn.active::before {
      content: ''; position: absolute; left: -10px; top: 8px; bottom: 8px;
      width: 3px; background: var(--rzi-blue); border-radius: 0 2px 2px 0;
    }
    .sidebar-btn svg { width: 18px; height: 18px; stroke-width: 1.8; }
    .sidebar-spacer { flex: 1; }

    /* ═══ MAIN ═══ */
    .main { overflow-y: auto; padding: 20px 24px; }

    /* ═══ HERO (greeting) ═══ */
    .hero {
      background: linear-gradient(135deg, var(--rzi-blue) 0%, #1e40af 100%);
      color: white; border-radius: 12px;
      padding: 22px 28px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 16px rgba(30,58,138,.15);
      position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute; right: -30px; top: -30px;
      width: 180px; height: 180px; border-radius: 50%;
      background: rgba(255,255,255,.05);
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .12em; opacity: .8; text-transform: uppercase; }
    .hero-title { font-size: 26px; font-weight: 800; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
    .hero-date { font-size: 12px; opacity: .85; margin-top: 4px; }
    .hero-tags { display: flex; gap: 6px; margin-top: 12px; }
    .hero-tag {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 999px; letter-spacing: .04em;
    }
    .hero-tag.green { background: rgba(16,185,129,.25); color: #bbf7d0; }
    .hero-tag.orange { background: rgba(240,165,0,.25); color: #fde68a; }
    .hero-clock { position: relative; z-index: 1; text-align: right; }
    .hero-time { font-size: 36px; font-weight: 800; letter-spacing: -.02em; }
    .hero-tz { font-size: 11px; opacity: .8; margin-top: 2px; letter-spacing: .12em; }

    /* ═══ KPI LIST (stacked) ═══ */
    .kpi-list { display: flex; flex-direction: column; gap: 10px; max-width: 720px; }
    .kpi {
      background: var(--rzi-surface); border: 1px solid var(--rzi-border);
      border-radius: 12px; padding: 16px 22px;
      display: flex; align-items: center; gap: 16px;
      transition: transform .15s, box-shadow .15s;
    }
    .kpi:hover { transform: translateX(2px); box-shadow: 0 4px 12px rgba(0,0,0,.04); }
    .kpi-text { flex: 1; }
    .kpi-value { font-size: 22px; font-weight: 800; color: var(--rzi-text); line-height: 1.1; }
    .kpi-label { font-size: 13px; font-weight: 600; margin-top: 4px; }
    .kpi-label.green { color: var(--status-ok); }
    .kpi-label.blue { color: var(--status-info); }
    .kpi-label.orange { color: var(--status-warn); }
    .kpi-label.red { color: var(--status-alert); }
    .kpi-label.cyan { color: var(--status-cyan); }
    .kpi-label.purple { color: var(--status-purple); }
    .kpi-sub { font-size: 11px; color: var(--rzi-text-dim); margin-top: 2px; }
    .kpi-icon { font-size: 24px; }

    /* ═══ TWO-COL GRID (under KPI) ═══ */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 20px; max-width: 1100px; }
    @media (max-width: 1000px) { .grid-2 { grid-template-columns: 1fr; } }
    .panel {
      background: var(--rzi-surface); border: 1px solid var(--rzi-border);
      border-radius: 12px; padding: 18px 20px;
    }
    .panel-title { font-size: 14px; font-weight: 700; color: var(--rzi-text); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .panel-title-icon { font-size: 16px; }

    /* Donut */
    .donut-wrap { display: flex; align-items: center; gap: 16px; }
    .donut { width: 100px; height: 100px; flex-shrink: 0; }
    .donut-legend { flex: 1; }
    .donut-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; }
    .donut-dot { width: 10px; height: 10px; border-radius: 2px; }
    .donut-label { flex: 1; color: var(--rzi-text-dim); }
    .donut-val { font-weight: 700; color: var(--rzi-text); }

    /* Distribution bars */
    .dist-list { display: flex; flex-direction: column; gap: 10px; }
    .dist-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .dist-name { width: 80px; color: var(--rzi-text-dim); font-weight: 500; }
    .dist-bar-wrap { flex: 1; height: 8px; background: var(--rzi-bg); border-radius: 4px; overflow: hidden; }
    .dist-bar { height: 100%; background: var(--rzi-blue); border-radius: 4px; }
    .dist-val { font-weight: 700; color: var(--rzi-text); width: 30px; text-align: right; }

    /* Quick actions */
    .qa-list { display: flex; flex-direction: column; gap: 4px; }
    .qa-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px; cursor: pointer;
      transition: background .15s;
    }
    .qa-item:hover { background: var(--rzi-bg); }
    .qa-item-icon { color: var(--rzi-blue); font-size: 16px; }
    .qa-label { flex: 1; font-weight: 600; color: var(--rzi-text); font-size: 13px; }
    .qa-arrow { color: var(--rzi-text-dim); }

    /* ═══ TOAST ═══ */
    .toast-stack { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
    .toast {
      background: var(--rzi-blue); color: white;
      border-radius: 12px; padding: 14px 18px; min-width: 320px; max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      animation: slideIn .3s ease-out;
    }
    .toast-head { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: .12em; font-weight: 700; opacity: .85; }
    .toast-name { font-size: 16px; font-weight: 800; margin-top: 4px; }
    .toast-body { font-size: 12px; opacity: .9; margin-top: 4px; }
    .toast-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; font-size: 11px; }
    .toast-cta { background: white; color: var(--rzi-blue); padding: 4px 14px; border-radius: 6px; font-weight: 700; cursor: pointer; border: none; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ═══ LOGIN ═══ */
    .login-wrap { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, var(--rzi-blue), #1e40af); padding: 24px; }
    .login-card { background: white; border-radius: 16px; padding: 36px; max-width: 400px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,.4); }
    .login-logo { width: 56px; height: 56px; border-radius: 12px; background: var(--rzi-blue); color: white; display: grid; place-items: center; font-weight: 800; font-size: 24px; margin-bottom: 16px; }
    .login-card h1 { font-size: 22px; font-weight: 800; }
    .login-card p { color: var(--rzi-text-dim); margin-top: 4px; font-size: 13px; }
    .form-group { margin-top: 16px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--rzi-text-dim); display: block; margin-bottom: 5px; }
    .form-group input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--rzi-border); border-radius: 8px; font-size: 14px; font-family: inherit; }
    .form-group input:focus { outline: none; border-color: var(--rzi-blue-light); }
    .login-submit { width: 100%; margin-top: 20px; padding: 11px; background: var(--rzi-blue); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; }
    .login-submit:hover { background: #1e40af; }
    .login-error { color: #dc2626; font-size: 12px; margin-top: 10px; text-align: center; }
    .login-hint { color: var(--rzi-text-dim); font-size: 11px; text-align: center; margin-top: 14px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login" class="login-wrap">
  <form class="login-card" onsubmit="return App.login(event)">
    <div class="login-logo">R</div>
    <h1>RZI Camp</h1>
    <p>Résidence Roxgold Sango · Côte d'Ivoire</p>
    <div class="form-group">
      <label>Identifiant</label>
      <input id="login-user" type="text" value="admin" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input id="login-pass" type="password" value="admin123" autocomplete="current-password" required />
    </div>
    <button class="login-submit" type="submit" id="login-btn">Se connecter</button>
    <div id="login-error" class="login-error"></div>
    <div class="login-hint">admin / admin123</div>
  </form>
</div>

<!-- ═══ APP ═══ -->
<div id="app" class="app hidden">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="header-x" title="Fermer">×</button>
      <div class="header-logo">
        <img src="roxgold-logo.png" alt="Roxgold" />
      </div>
      <div class="header-title">RÉSIDENCE ROXGOLD SANGO</div>
    </div>
    <div class="header-right">
      <div class="header-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Rechercher personnel, résidence…" />
      </div>
      <button class="header-icon" title="Thème">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="header-icon has-badge" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span class="badge">3</span>
      </button>
      <button class="user-chip" title="Profil">
        <div class="user-chip-info">
          <div class="user-name" id="user-name">Admin RZI</div>
          <div class="user-role">ADMINISTRATEUR</div>
        </div>
        <div class="user-toggle">▾</div>
      </button>
      <button class="header-icon" title="Toggle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
  </header>

  <!-- SIDEBAR (rail) -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Hero -->
    <div class="hero">
      <div class="hero-content">
        <div class="hero-eyebrow">⛺ CAMP ROXGOLD SANGO · CÔTE D'IVOIRE</div>
        <div class="hero-title" id="hero-title">Bonjour, Admin 👋</div>
        <div class="hero-date" id="hero-date">—</div>
        <div class="hero-tags">
          <span class="hero-tag green" id="hero-bats">● — bâtiments</span>
          <span class="hero-tag orange" id="hero-occ">—% occupé</span>
        </div>
      </div>
      <div class="hero-clock">
        <div class="hero-time" id="hero-time">--:--</div>
        <div class="hero-tz"><span id="hero-min">--</span> · UTC</div>
      </div>
    </div>

    <!-- KPI list (stacked) -->
    <div class="kpi-list" id="kpi-list"></div>

    <!-- Two-col grid -->
    <div class="grid-2">
      <div class="panel">
        <div class="panel-title"><span class="panel-title-icon">📊</span>Occupation</div>
        <div class="donut-wrap">
          <svg class="donut" viewBox="0 0 42 42" id="donut"></svg>
          <div class="donut-legend" id="donut-legend"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="panel-title-icon">🏢</span>Distribution</div>
        <div class="dist-list" id="dist-list"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="panel-title-icon">⚡</span>Actions rapides</div>
        <div class="qa-list">
          <div class="qa-item" onclick="App.toast('RÉSIDENCES', '204 bâtiments · 920 chambres', '🏠', 'Navigation')">
            <span class="qa-item-icon">🏠</span>
            <div class="qa-label">Résidences</div>
            <div class="qa-arrow">→</div>
          </div>
          <div class="qa-item" onclick="App.toast('CARTE GIS', 'Jumeau numérique interactif', '🗺️', 'Navigation')">
            <span class="qa-item-icon">🗺️</span>
            <div class="qa-label">Carte GIS</div>
            <div class="qa-arrow">→</div>
          </div>
          <div class="qa-item" onclick="App.toast('PERSONNEL', '20 employés sur site', '👤', 'Navigation')">
            <span class="qa-item-icon">👤</span>
            <div class="qa-label">Personnel</div>
            <div class="qa-arrow">→</div>
          </div>
          <div class="qa-item" onclick="App.toast('INCIDENTS', '7 incidents en cours', '🔧', 'Navigation')">
            <span class="qa-item-icon">🔧</span>
            <div class="qa-label">Incidents</div>
            <div class="qa-arrow">→</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-stack" class="toast-stack"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ════════════════════════════════════════════════════════════════
   RZI CAMP 2.0 — Logique applicative
   ════════════════════════════════════════════════════════════════ */
const API = 'https://rzi-camp-backend.onrender.com';

const ICONS = {
  dashboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
  map: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>',
  copilote: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>',
  residences: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  operations: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
  maintenance: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
  voyages: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>',
  personnel: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  evenements: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  audit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11H1l4-4M9 5H1l4 4M15 13h8l-4-4M15 19h8l-4 4"/></svg>',
  rapports: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
  presences: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  boutique: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9 4 3h16l1 6M3 9v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9M3 9h18M9 14h6"/></svg>',
  qr: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM20 14v3M14 20h3M17 17h3v3"/></svg>',
  rh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg>',
  workflow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M9 6h6a3 3 0 0 1 3 3v6"/></svg>',
  analytics: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
  jumeau: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/></svg>',
  restauration: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11h18v11H3zM5 11V7a7 7 0 0 1 14 0v4"/></svg>',
  induction: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>',
  statut: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>'
};

const NAV = [
  'dashboard', 'map', 'jumeau', 'analytics', 'copilote',
  'residences', 'maintenance', 'voyages', 'restauration', 'qr',
  'personnel', 'presences', 'rh', 'induction',
  'evenements', 'audit', 'rapports', 'workflow', 'statut',
  'boutique', 'operations'
];

const App = {
  token: null, user: null,
  data: { batiments: [], personnel: [], incidents: [], voyages: [] },

  async login(e) {
    e.preventDefault();
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.textContent = ''; btn.disabled = true; btn.textContent = 'Connexion…';
    try {
      const r = await fetch(`${API}/api/auth/login/`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      if (!r.ok) throw new Error('Identifiants invalides');
      const j = await r.json();
      this.token = j.access;
      localStorage.setItem('access', j.access);
      localStorage.setItem('refresh', j.refresh);
      await this.fetchUser();
      await this.loadAll();
      this.show();
    } catch (e) { err.textContent = e.message; }
    finally { btn.disabled = false; btn.textContent = 'Se connecter'; }
  },

  async fetchUser() {
    try {
      const r = await fetch(`${API}/api/auth/me/`, { headers: { Authorization: `Bearer ${this.token}` } });
      if (r.ok) this.user = await r.json();
    } catch (e) {}
  },

  async loadAll() {
    const h = { Authorization: `Bearer ${this.token}` };
    const tasks = {
      batiments: fetch(`${API}/api/batiments/`, { headers: h }).then(r => r.json()).then(d => d.results || d || []).catch(() => []),
      personnel: fetch(`${API}/api/personnel/`, { headers: h }).then(r => r.json()).then(d => d.results || d || []).catch(() => []),
      incidents: fetch(`${API}/api/incidents/`, { headers: h }).then(r => r.json()).then(d => d.results || d || []).catch(() => []),
      voyages: fetch(`${API}/api/voyages/`, { headers: h }).then(r => r.json()).then(d => d.results || d || []).catch(() => [])
    };
    for (const k of Object.keys(tasks)) {
      try { this.data[k] = await tasks[k]; } catch { this.data[k] = []; }
    }
  },

  renderSidebar() {
    const sb = document.getElementById('sidebar');
    sb.innerHTML = NAV.map((id, i) => `
      <button class="sidebar-btn ${id === 'dashboard' ? 'active' : ''}" data-route="${id}" title="${id}">
        ${ICONS[id] || ICONS.dashboard}
      </button>
      ${id === 'copilote' || id === 'qr' || id === 'induction' || id === 'statut' ? '<div style="height:8px"></div>' : ''}
    `).join('');
    sb.querySelectorAll('.sidebar-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sb.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const labels = { dashboard: 'Tableau de bord', map: 'Carte GIS', jumeau: 'Jumeau Numérique', analytics: 'Analytics IA', copilote: 'Copilote IA', residences: 'Résidences', maintenance: 'Maintenance', voyages: 'Voyages', restauration: 'Restauration', qr: 'QR Anti-Fraude', personnel: 'Personnel', presences: 'Présences', rh: 'Ressources Humaines', induction: 'Induction QHSE', evenements: 'Événements', audit: 'Audit Trail', rapports: 'Rapports', workflow: 'Workflow Hub', statut: 'Statut Système', boutique: 'Boutique', operations: 'Centre Opérationnel' };
        App.toast(labels[btn.dataset.route] || btn.dataset.route, 'Module ouvert', '📂', 'Navigation');
      });
    });
  },

  show() {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    this.renderSidebar();
    if (this.user) {
      const fn = this.user.first_name || this.user.username || 'Admin';
      document.getElementById('hero-title').textContent = `Bonjour, ${fn} 👋`;
      document.getElementById('user-name').textContent = this.user.first_name ? `${this.user.first_name} ${this.user.last_name || 'RZI'}`.trim() : 'Admin RZI';
    }
    this.startClock();
    this.render();
    setTimeout(() => this.toast('Barbecu', 'Venez on va suivre le lancement de la coupe', '📣', 'Restauration'), 1500);
  },

  startClock() {
    const tick = () => {
      const d = new Date();
      const h = String(d.getUTCHours()).padStart(2, '0');
      const m = String(d.getUTCMinutes()).padStart(2, '0');
      const min = String(d.getUTCMinutes()).padStart(2, '0');
      document.getElementById('hero-time').textContent = `${h}:${m}`;
      document.getElementById('hero-min').textContent = min;
      const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
      document.getElementById('hero-date').textContent = d.toLocaleDateString('fr-FR', opts);
    };
    tick();
    setInterval(tick, 30000);
  },

  render() {
    const d = this.data;
    const bats = d.batiments;
    const occ = bats.filter(b => b.statut === 'Occupé').length;
    const lib = bats.filter(b => b.statut === 'Libre').length;
    const res = bats.filter(b => b.statut === 'Réservé').length;
    const maint = bats.filter(b => b.statut === 'Maintenance').length;
    const incOpen = d.incidents.filter(i => !['cloture', 'resolu'].includes(i.statut)).length;
    const enVoyage = d.personnel.filter(p => p.en_voyage || p.statut === 'voyage').length;
    const total = bats.length;
    const occRate = total > 0 ? Math.round((occ / total) * 100) : 0;

    document.getElementById('hero-bats').textContent = `● ${total} bâtiments`;
    document.getElementById('hero-occ').textContent = `${occRate}% occupé`;

    const kpis = [
      { v: lib || 95, l: 'Chambres libres', s: `${Math.round((lib || 95)/total*100) || 47}% du parc`, c: 'green', icon: '✓' },
      { v: occ || 62, l: 'Chambres occupées', s: `${occRate}% d'occupation`, c: 'blue', icon: '🏠' },
      { v: res || 27, l: 'Réservées', s: 'À planifier', c: 'orange', icon: '📋' },
      { v: incOpen || 7, l: 'Incidents ouverts', s: '1 en cours', c: 'red', icon: '🚨' },
      { v: enVoyage, l: 'En voyage', s: d.voyages.length ? `${d.voyages.length} rotations actives` : 'Aucune rotation', c: 'cyan', icon: '✈' },
      { v: total, l: 'Total bâtiments', s: `${d.personnel.length} pers. sur site`, c: 'purple', icon: '🏗' }
    ];
    const kpiHtml = kpis.map(k => `
      <div class="kpi">
        <div class="kpi-text">
          <div class="kpi-value">${k.v}</div>
          <div class="kpi-label ${k.c}">${k.l}</div>
          <div class="kpi-sub">${k.s}</div>
        </div>
        <div class="kpi-icon">${k.icon}</div>
      </div>
    `).join('');
    document.getElementById('kpi-list').innerHTML = kpiHtml;

    // Donut
    this.renderDonut([
      { label: 'Occupé', value: occ || 62, color: '#16a34a' },
      { label: 'Libre', value: lib || 95, color: '#2563eb' },
      { label: 'Réservé', value: res || 27, color: '#ea580c' },
      { label: 'Maintenance', value: maint || 19, color: '#dc2626' }
    ]);

    // Distribution par société
    const bySoc = {};
    d.personnel.forEach(p => {
      const s = p.societe || 'Autre';
      bySoc[s] = (bySoc[s] || 0) + 1;
    });
    const top = Object.entries(bySoc).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const maxV = Math.max(1, ...top.map(t => t[1]));
    const distHtml = top.length ? top.map(([s, n]) => `
      <div class="dist-row">
        <div class="dist-name">${s.length > 12 ? s.slice(0, 12) + '…' : s}</div>
        <div class="dist-bar-wrap"><div class="dist-bar" style="width: ${(n/maxV*100)}%"></div></div>
        <div class="dist-val">${n}</div>
      </div>
    `).join('') : '<div style="color:var(--rzi-text-dim); font-size:12px;">Aucun personnel</div>';
    document.getElementById('dist-list').innerHTML = distHtml;
  },

  renderDonut(segments) {
    const total = segments.reduce((a, b) => a + b.value, 0) || 1;
    const r = 15.9;
    let acc = 0;
    let circles = '';
    segments.forEach(s => {
      const pct = s.value / total;
      const offset = (acc / total) * 100;
      const dash = `${pct * 100} ${100 - pct * 100}`;
      acc += s.value;
      circles += `<circle cx="21" cy="21" r="${r}" fill="transparent" stroke="${s.color}" stroke-width="6" stroke-dasharray="${dash}" stroke-dashoffset="${25 - offset}" />`;
    });
    document.getElementById('donut').innerHTML = `
      <circle cx="21" cy="21" r="${r}" fill="transparent" stroke="#e2e8f0" stroke-width="6" />
      ${circles}
      <text x="21" y="20" text-anchor="middle" font-size="6" font-weight="800" fill="#1e293b">${total}</text>
      <text x="21" y="27" text-anchor="middle" font-size="3" fill="#64748b">bâtiments</text>
    `;
    document.getElementById('donut-legend').innerHTML = segments.map(s => `
      <div class="donut-row">
        <div class="donut-dot" style="background:${s.color}"></div>
        <div class="donut-label">${s.label}</div>
        <div class="donut-val">${s.value}</div>
      </div>
    `).join('');
  },

  toast(title, body, emoji = '🔔', tag = '') {
    const stack = document.getElementById('toast-stack');
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `
      <div class="toast-head">${emoji} ${tag || 'NOUVEL ÉVÉNEMENT'}</div>
      <div class="toast-name">${title}</div>
      <div class="toast-body">${body}</div>
      <div class="toast-foot">
        <span>📍 ${tag || '—'}</span>
        <button class="toast-cta" onclick="this.closest('.toast').remove()">Voir →</button>
      </div>
    `;
    stack.appendChild(el);
    setTimeout(() => el.remove(), 8000);
  },

  async init() {
    const saved = localStorage.getItem('access');
    if (saved) {
      this.token = saved;
      try {
        await this.fetchUser();
        await this.loadAll();
        this.show();
        return;
      } catch (e) {
        localStorage.removeItem('access');
        localStorage.removeItem('refresh');
      }
    }
  }
};

App.init();
</script>
</body>
</html>
