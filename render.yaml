services:
  - type: web
    name: rzi-camp-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_db
    startCommand: daphne -b 0.0.0.0 -p $PORT rzi_camp.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: rzi_camp.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rzi-camp-db
          property: connectionString

  - type: web
    name: rzi-camp-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: rzi-camp-db
    databaseName: rzi_camp
    user: rzi_camp
